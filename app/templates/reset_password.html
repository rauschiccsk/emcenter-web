<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nové heslo — EM-1 s.r.o.</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=pwreset1">
    {% if umami_website_id %}
    <script defer src="{{ umami_script_url }}" data-website-id="{{ umami_website_id }}"></script>
    {% endif %}
</head>
<body class="checkout-page">

<!-- Minimal Header -->
<header class="checkout-header">
    <div class="container checkout-header-inner">
        <a href="/" class="logo">EM-1 s.r.o.</a>
        <div class="checkout-header-right">
            <a href="tel:+421905354537" class="checkout-phone">+421 905 354 537</a>
        </div>
    </div>
</header>

<main class="checkout-main">
    <div class="container auth-page">
        <h1>Nové heslo</h1>

        <form id="reset-form" novalidate>
            <div class="form-group">
                <label for="password">Nové heslo *</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
                <span class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="password-confirm">Potvrdenie hesla *</label>
                <input type="password" id="password-confirm" name="password-confirm" required autocomplete="new-password">
                <span class="field-error"></span>
            </div>

            <div id="reset-error" class="error-message" style="display: none;"></div>

            <button type="submit" class="btn btn-primary btn-full" id="reset-submit-btn">Zmeniť heslo</button>
        </form>

        <p class="auth-links">
            <a href="/login">Späť na prihlásenie</a>
        </p>
    </div>
</main>

<!-- Minimal Footer -->
<footer class="checkout-footer">
    <div class="container checkout-footer-inner">
        <p>&copy; 2026 EM-1 s.r.o.</p>
        <nav class="checkout-footer-links">
            <a href="/vop" target="_blank">VOP</a>
            <a href="/ochrana-osobnych-udajov" target="_blank">Ochrana osobných údajov</a>
        </nav>
    </div>
</footer>

<script>
(function () {
    "use strict";
    var form = document.getElementById("reset-form");
    if (!form) return;

    // Extract token from URL
    var params = new URLSearchParams(window.location.search);
    var token = params.get("token");

    if (!token) {
        document.getElementById("reset-error").textContent = "Chýba token. Použite odkaz z emailu.";
        document.getElementById("reset-error").style.display = "block";
        document.getElementById("reset-submit-btn").disabled = true;
        return;
    }

    function setFieldError(id, msg) {
        var el = document.getElementById(id);
        if (!el) return;
        var group = el.closest(".form-group");
        if (group) {
            group.classList.add("error");
            var span = group.querySelector(".field-error");
            if (span) span.textContent = msg;
        }
    }

    function clearErrors() {
        var spans = form.querySelectorAll(".field-error");
        for (var i = 0; i < spans.length; i++) spans[i].textContent = "";
        var groups = form.querySelectorAll(".form-group.error");
        for (var j = 0; j < groups.length; j++) groups[j].classList.remove("error");
        document.getElementById("reset-error").style.display = "none";
    }

    form.addEventListener("submit", function (e) {
        e.preventDefault();
        clearErrors();

        var password = document.getElementById("password").value;
        var confirm = document.getElementById("password-confirm").value;
        var valid = true;

        if (!password) { setFieldError("password", "Zadajte nové heslo"); valid = false; }
        else if (password.length < 8) { setFieldError("password", "Heslo musí mať minimálne 8 znakov"); valid = false; }
        if (!confirm) { setFieldError("password-confirm", "Zopakujte heslo"); valid = false; }
        else if (password !== confirm) { setFieldError("password-confirm", "Heslá sa nezhodujú"); valid = false; }

        if (!valid) return;

        var btn = document.getElementById("reset-submit-btn");
        btn.disabled = true;
        btn.textContent = "Mením heslo...";

        fetch("/api/eshop/customers/password/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token, new_password: password })
        })
        .then(function (resp) {
            return resp.json().then(function (data) {
                return { ok: resp.ok, data: data };
            });
        })
        .then(function (result) {
            if (result.ok) {
                window.location.href = "/login?reset=success";
            } else {
                var errorEl = document.getElementById("reset-error");
                errorEl.textContent = result.data.detail || result.data.error || "Neplatný alebo expirovaný odkaz.";
                errorEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Zmeniť heslo";
            }
        })
        .catch(function () {
            var errorEl = document.getElementById("reset-error");
            errorEl.textContent = "Chyba pri zmene hesla. Skúste to znova.";
            errorEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Zmeniť heslo";
        });
    });
})();
</script>
</body>
</html>
