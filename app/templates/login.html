<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prihlásenie — EM-1 s.r.o.</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=33c14f0">
    {% if umami_website_id %}
    <script defer src="{{ umami_script_url }}" data-website-id="{{ umami_website_id }}"></script>
    {% endif %}
</head>
<body class="checkout-page">

<!-- Minimal Header -->
<header class="checkout-header">
    <div class="container checkout-header-inner">
        <a href="/" class="logo">EM-1 s.r.o.</a>
        <div class="checkout-header-right">
            <a href="tel:+421905354537" class="checkout-phone">+421 905 354 537</a>
        </div>
    </div>
</header>

<main class="checkout-main">
    <div class="container auth-page">
        <h1>Prihlásenie</h1>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required autocomplete="email">
                <span class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Heslo *</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
                <span class="field-error"></span>
            </div>

            <div id="login-error" class="error-message" style="display: none;"></div>

            <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn">Prihlásiť sa</button>
        </form>

        <p class="auth-links">
            Nemáte účet? <a href="/register">Zaregistrujte sa</a>
        </p>
    </div>
</main>

<!-- Minimal Footer -->
<footer class="checkout-footer">
    <div class="container checkout-footer-inner">
        <p>&copy; 2026 EM-1 s.r.o.</p>
        <nav class="checkout-footer-links">
            <a href="/vop" target="_blank">VOP</a>
            <a href="/ochrana-osobnych-udajov" target="_blank">Ochrana osobných údajov</a>
        </nav>
    </div>
</footer>

<script src="/static/js/auth.js?v=4a9c400"></script>
</body>
</html>
