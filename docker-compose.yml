services:
  emcenter-web:
    build: .
    container_name: emcenter-web-staging
    ports:
      - "9163:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - NEX_API_BASE=${NEX_API_BASE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default

networks:
  default:
    name: emcenter-network
