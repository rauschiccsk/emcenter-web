name: CI/CD — EM Center Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: andros-ubuntu-emcenter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: python -m ruff check app/

  test:
    runs-on: andros-ubuntu-emcenter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build:
    runs-on: andros-ubuntu-emcenter
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Docker build test
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
          COMMIT=$(git rev-parse --short HEAD)
          docker build \
            --build-arg APP_VERSION=$VERSION \
            --build-arg APP_COMMIT=$COMMIT \
            -t emcenter-web:test .

  deploy:
    runs-on: andros-ubuntu-emcenter
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy
        run: |
          cd /opt/emcenter-web-src
          git pull origin main
          export APP_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
          export APP_COMMIT=$(git rev-parse --short HEAD)
          docker compose down
          docker compose build --build-arg APP_VERSION=$APP_VERSION --build-arg APP_COMMIT=$APP_COMMIT
          docker compose up -d
      - name: Verify health
        run: |
          sleep 5
          curl -f http://localhost:9162/health

      - name: Auto-increment version tag
        run: |
          cd /opt/emcenter-web-src
          git fetch --tags origin
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
